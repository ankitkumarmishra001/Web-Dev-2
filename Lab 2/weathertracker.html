<!DOCTYPE html>
<html>
<head>
<title>Colorful Weather Tracker</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:20px;
    width:350px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

h2{
    color:white;
}

input{
    padding:10px;
    width:70%;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#ff9800;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e68900;
    transform:scale(1.05);
}

#result{
    margin-top:20px;
    color:white;
    font-size:18px;
}

#error{
    color:#ffdddd;
    margin-top:10px;
}

.weather-icon{
    width:80px;
}

h3{
    color:white;
}

.history-item{
    background:white;
    padding:6px 10px;
    border-radius:8px;
    margin:5px;
    display:inline-block;
    cursor:pointer;
    transition:0.3s;
}

.history-item:hover{
    background:#ff9800;
    color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>🌤 Weather Tracker</h2>

<input type="text" id="city" placeholder="Enter City">
<button onclick="getWeather()">Search</button>

<div id="result"></div>
<div id="error"></div>

<h3>Recent Searches</h3>

<button onclick="clearHistory()">🗑 Clear History</button>

<div id="history"></div>

</div>

<script>

const apiKey = "47e249090e88f56f322daf4e85577484";

async function getWeather(){

const cityName = document.getElementById("city").value.trim();
const resultDiv = document.getElementById("result");
const errorDiv = document.getElementById("error");

resultDiv.innerHTML="";
errorDiv.innerHTML="";

if(cityName===""){
errorDiv.innerHTML="⚠ Please enter a city name";
return;
}

try{

const response = await fetch(
`https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=${apiKey}&units=metric`
);

if(!response.ok){
throw new Error("City not found");
}

const data = await response.json();
const icon = data.weather[0].icon;

resultDiv.innerHTML=`

<img class="weather-icon" 
src="https://openweathermap.org/img/wn/${icon}@2x.png">

<p><b>${data.name}</b></p>
<p>🌡 Temperature: ${data.main.temp} °C</p>
<p>🌥 Condition: ${data.weather[0].description}</p>

`;

saveHistory(cityName);

}catch(error){

errorDiv.innerHTML="❌ "+error.message;

}

}

function saveHistory(city){

let cities = JSON.parse(localStorage.getItem("cities")) || [];

if(!cities.includes(city)){
cities.push(city);
localStorage.setItem("cities",JSON.stringify(cities));
}

loadHistory();

}

function loadHistory(){
const historyDiv=document.getElementById("history");
historyDiv.innerHTML="";

let cities = JSON.parse(localStorage.getItem("cities")) || [];

for(let i=0;i<cities.length;i++){

let span=document.createElement("span");

span.innerText=cities[i];
span.className="history-item";
span.onclick=function(){

document.getElementById("city").value=cities[i];

getWeather();

};

historyDiv.appendChild(span);

}

}

function clearHistory(){

localStorage.removeItem("cities");
document.getElementById("history").innerHTML="";

}

loadHistory();

</script>

</body>
</html>
